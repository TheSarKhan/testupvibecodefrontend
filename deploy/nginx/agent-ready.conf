# Agent-discovery serving rules for testup.az
# ---------------------------------------------------------------------------
# The static files this config refers to are built into dist/ by `npm run build`
# (they live in public/). Without these rules nginx serves them with the wrong
# Content-Type — or, worse, the SPA fallback returns index.html with HTTP 200 for
# /sitemap.xml and every /.well-known/* path, which is why scanners reported
# "returned HTML instead of JSON".
#
# INSTALL
#   1. Copy the two `map` blocks into the *http* context — e.g. a new file
#      /etc/nginx/conf.d/agent-ready-maps.conf (conf.d is inside http {}).
#   2. Copy the `location` blocks + the Link-header block into the testup.az
#      *server* block, or save this file as
#      /etc/nginx/snippets/agent-ready.conf and `include` it there.
#   3. nginx -t && systemctl reload nginx
#
# CHECK FIRST — two things in the existing server block will silently break this:
#   * a blanket `location ~ /\. { deny all; }` 403s every /.well-known/ path;
#     narrow it to `location ~ /\.(?!well-known)`.
#   * any `add_header` inside `location / { … }`. nginx does not merge add_header
#     across levels: a single add_header in a child block drops *all* inherited
#     ones, so the Link headers would vanish. If `location /` already sets
#     headers (Cache-Control, security headers…), repeat the Link lines there.


# ══ http {} context ════════════════════════════════════════════════════════

# Markdown for agents: a client that explicitly asks for text/markdown gets the
# .md rendition when one exists. Browsers send Accept: text/html,... and never
# match, so HTML stays the default.
map $http_accept $md_ext {
    default          "";
    "~*text/markdown" ".md";
}

map $http_accept $md_index {
    default          "";
    "~*text/markdown" "/index.md";
}


# ══ server {} context ══════════════════════════════════════════════════════

# ── RFC 8288 Link headers ─────────────────────────────────────────────────
# Advertised on the homepage and every other HTML response. Only IANA-registered
# relation types are used. `always` so the headers survive non-2xx responses too.
#
# Keep this list in sync with public/.well-known/api-catalog.
add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json"' always;
add_header Link '</v3/api-docs>; rel="service-desc"; type="application/json"' always;
add_header Link '</swagger-ui/index.html>; rel="service-doc"; type="text/html"' always;
add_header Link '</api/health>; rel="status"; type="application/json"' always;
add_header Link '</auth.md>; rel="describedby"; type="text/markdown"' always;
add_header Link '</istifade-sertleri>; rel="terms-of-service"' always;
add_header Link '</gizlilik-siyaseti>; rel="privacy-policy"' always;

# Responses vary by Accept because of the markdown negotiation below.
add_header Vary Accept always;

# ── /.well-known/ ──────────────────────────────────────────────────────────
# Extension-less discovery documents need an explicit type, and a miss here must
# be a real 404 — never the SPA shell.
location = /.well-known/api-catalog {
    default_type application/linkset+json;
    charset utf-8;
    try_files $uri =404;
}

location = /.well-known/oauth-protected-resource {
    default_type application/json;
    charset utf-8;
    try_files $uri =404;
}

location ^~ /.well-known/agent-skills/ {
    charset utf-8;
    types {
        application/json json;
        text/markdown    md;
    }
    default_type application/json;
    try_files $uri =404;
}

# Anything else under /.well-known/ that does not exist: 404, not index.html.
location ^~ /.well-known/ {
    try_files $uri =404;
}

# ── Markdown documents at the site root ────────────────────────────────────
location = /auth.md {
    default_type text/markdown;
    charset utf-8;
    try_files $uri =404;
}

location ~ \.md$ {
    default_type text/markdown;
    charset utf-8;
    try_files $uri =404;
}

# ── sitemap / robots ───────────────────────────────────────────────────────
location = /sitemap.xml {
    default_type application/xml;
    charset utf-8;
    try_files $uri =404;
}

location = /robots.txt {
    default_type text/plain;
    charset utf-8;
    try_files $uri =404;
}

# ── SPA fallback with markdown content negotiation ─────────────────────────
# `/` with Accept: text/markdown → /index.md; anything else → index.html.
# $md_ext is empty for normal browsers, so `try_files $uri$md_ext …` collapses
# to the usual `try_files $uri …`.
#
# The `if` is the one form nginx documents as safe inside a location: a bare
# `rewrite … last`. try_files cannot be used here because an empty $md_index
# would expand to an invalid empty path.
location = / {
    if ($md_index) {
        rewrite ^ /index.md last;
    }
    try_files /index.html =404;
}

location / {
    try_files $uri$md_ext $uri $uri/ /index.html;
}
