name: Deploy Frontend to production server server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/testupFront
            # Force the server working tree to match main. `git pull` aborts when
            # the server has local changes (e.g. a package-lock.json rewritten by
            # a previous npm install), which kept breaking the deploy. fetch +
            # hard reset always lands on the latest commit, discarding any
            # server-side cruft — the deploy target is never hand-edited.
            git fetch origin main 2>&1
            git reset --hard origin/main 2>&1
            npm install 2>&1
            npm run build 2>&1

      # Notifications are best-effort: continue-on-error so a Telegram hiccup
      # (e.g. a commit message that breaks markdown parsing) can never turn an
      # otherwise-successful deploy red. The SSH step above is the source of truth.
      # We send the commit SHA, not the raw commit message — arbitrary commit
      # text can contain backticks / `_` / `<...>` that make Telegram's markdown
      # parser return 400 and fail the step.
      - name: Notify Telegram (Success)
        if: success()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Frontend Deploy Successful*

            📦 *Repo:* ${{ github.repository }}
            🌿 *Branch:* ${{ github.ref_name }}
            👤 *By:* ${{ github.actor }}
            💬 *Commit:* ${{ github.sha }}
            🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram (Failure)
        if: failure()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Frontend Deploy FAILED*

            📦 *Repo:* ${{ github.repository }}
            🌿 *Branch:* ${{ github.ref_name }}
            👤 *By:* ${{ github.actor }}
            💬 *Commit:* ${{ github.sha }}
            🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
